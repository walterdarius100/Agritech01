# Configuration Decap CMS préparatoire.
# Aucun secret n'est stocké ici. Pour rendre /admin opérationnel, configurez
# séparément une authentification Decap compatible (Netlify Identity + Git Gateway,
# GitHub OAuth, ou autre backend Decap sécurisé) côté hébergeur/service externe.
backend:
  name: git-gateway
  branch: main

local_backend: true
publish_mode: editorial_workflow
media_folder: "assets/images/blog"
public_folder: "assets/images/blog"
locale: "fr"

collections:
  - name: "actualites"
    label: "Actualités agricoles"
    label_singular: "Actualité agricole"
    folder: "content/actualites"
    create: true
    slug: "{{slug}}"
    extension: "md"
    format: "frontmatter"
    summary: "{{title}} — {{date}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Slug", name: "slug", widget: "string", hint: "Identifiant URL sans accents ni espaces, par exemple: alerte-chaleur-elevage" }
      - { label: "Résumé", name: "excerpt", widget: "text" }
      - label: "Catégorie"
        name: "category"
        widget: "select"
        options:
          - "Actualités"
          - "Alertes"
          - "Événements"
          - "Marché agricole"
          - "Analyse Agri-tech"
      - label: "Type"
        name: "type"
        widget: "select"
        options:
          - "Actualité"
          - "Alerte secteur"
          - "Analyse"
      - { label: "Date", name: "date", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
      - { label: "Auteur", name: "author", widget: "string", default: "Équipe Agri-tech" }
      - { label: "Image de couverture", name: "cover", widget: "image", required: false, hint: "Utiliser assets/images/blog/ pour les nouvelles images. Les anciennes images locales restent acceptées." }
      - { label: "À la une", name: "featured", widget: "boolean", default: false }
      - { label: "Publié", name: "published", widget: "boolean", default: true }
      - { label: "Contenu", name: "body", widget: "markdown" }
